services:
  mysql:
    image: mysql:8.0
    container_name: agentflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: agentflow123
      MYSQL_DATABASE: agentflow
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pagentflow123"]
      interval: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: agentflow-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:4.0.0        # 官方镜像,原生 KRaft,无需 Zookeeper;arm64 支持
    container_name: agentflow-kafka
    ports:
      - "9092:9092"
    environment:
      # 单节点 KRaft:同一进程既是 broker 又是 controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 关键:向宿主机客户端通告 localhost:9092,否则容器内 hostname 连不上
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"   # W1-2 允许自动建 topic;topic 也会由 NewTopic bean 显式声明

volumes:
  mysql-data:
