server:
  port: 8080
spring:
  application:
    name: agentflow-server
  datasource:
    url: jdbc:mysql://localhost:3306/agentflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: agentflow123
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: agentflow-server-result-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.agentflow.common.mq
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
agentflow:
  timeout:
    # 测试类会显式调用 sweep()/造过期数据来断言行为;后台定时器若也在跑会和测试并发操作
    # 同一批行(如 TimeoutSweepServiceTest 的过期 DISPATCHED 行),产生不确定的双重处理。
    # 测试专用配置把间隔拉到远大于任意单次 mvn test 运行时长,等效关闭后台扫描。
    sweep-interval-ms: 3600000
